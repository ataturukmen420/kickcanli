name: Deploy to Vercel
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run build
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_fPzAhgnVAyKhLaKX88U6ldR2
          vercel-project-id: prj_GKb321MuGJeFlCtAgMHdZrYbIzNl
          vercel-args: '--prod'
          working-directory: ./
